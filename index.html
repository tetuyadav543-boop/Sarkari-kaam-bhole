<!DOCTYPE html>
<html>
<head>
<title>Bhole Search</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7179024751681268"
     crossorigin="anonymous"></script>
<style>

body{
font-family:Arial;
text-align:center;
margin-top:120px;
transition:0.3s;
}
<h2>Welcome to Bhole Search</h2>
<p>Bhole Search is a simple search engine that helps users find information on the internet quickly.</p>

<h3>Features</h3>
<ul>
<li>Fast search</li>
<li>Simple design</li>
<li>Easy to use</li>
</ul>

<h3>Useful Links</h3>
<a href="about.html">About</a> |
<a href="contact.html">Contact</a> |
<a href="privacy.html">Privacy Policy</a>
.logo{
font-size:60px;
font-weight:bold;
color:#4285F4;
}

input{
width:400px;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
cursor:pointer;
background:#f1f1f1;
}

.dark{
background:#121212;
color:white;
}

</style>

</head>

<body id="body">

<h1 class="logo">Bhole Search</h1>

<input type="text" id="search" placeholder="Search anything">

<br>

<button onclick="search()">Search</button>
<button onclick="darkMode()">Dark Mode</button>

<script>

function search(){
var text=document.getElementById("search").value;
window.location="https://www.google.com/search?q="+text;
}

function darkMode(){
document.getElementById("body").classList.toggle("dark");
}

</script>

</body>
</html>
